# Hexo Configuration
# 文档: https://hexo.io/docs/configuration

# 站点基本信息（部署前请修改这里）---------------------------------------
title: Wangzhe's Blog
subtitle: '记录想法、研究与日常'
description: 'Wangzhe Gui 的个人博客 · 前端工程师'
keywords: blog, wangzhe gui, frontend, web, javascript
author: Wangzhe Gui
language: zh-CN
timezone: 'Asia/Shanghai'

# URL 设置 -------------------------------------------------------------
# 备案通过后正式启用 https://guiwz.cn；备案期间用 OSS 静态域名预览也可改这里
url: https://guiwz.cn
permalink: posts/:title/
permalink_defaults:
pretty_urls:
  trailing_index: false
  trailing_html: false

# 目录 -----------------------------------------------------------------
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# 写作配置 -------------------------------------------------------------
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# 首页设置 -------------------------------------------------------------
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# 分类与标签 -----------------------------------------------------------
default_category: uncategorized
category_map:
tag_map:

# 元数据 ---------------------------------------------------------------
meta_generator: true

# 日期格式 -------------------------------------------------------------
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# 分页 -----------------------------------------------------------------
per_page: 10
pagination_dir: page

# 文件包含/排除 --------------------------------------------------------
include:
exclude:
ignore:

# 搜索（Butterfly 主题的 local_search 需要）---------------------------
search:
  path: search.xml
  field: post
  content: true

# 主题 -----------------------------------------------------------------
# 主题的详细配置在 _config.butterfly.yml 里
theme: butterfly

# Sitemap (SEO) -------------------------------------------------------
sitemap:
  path: sitemap.xml
  rel: false
  tags: true
  categories: true

# RSS 订阅 -------------------------------------------------------------
feed:
  enable: true
  type: atom
  path: atom.xml
  limit: 20
  hub:
  content: true
  content_limit: 200
  content_limit_delim: ' '
  order_by: -date

# 部署到阿里云 OSS ----------------------------------------------------
# 真正的 accessKeyId / accessKeySecret 写在 _config.deploy.yml（gitignored）
# 部署命令：npm run deploy
deploy:
  type: ali-oss
  bucket: guiwz-blog
  region: oss-cn-shanghai
  # 以下两项在 _config.deploy.yml 中覆盖，避免提交到 git
  accessKeyId: ''
  accessKeySecret: ''
